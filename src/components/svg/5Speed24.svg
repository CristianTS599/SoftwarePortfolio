<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#6b6b6b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

  <!-- Neutral spine: full width ~3 to 21 -->
  <line x1="3" y1="12" x2="21" y2="12"/>

  <!-- R spur: branches left from spine, goes up -->
  <line x1="3" y1="7" x2="3" y2="12"/>

  <!-- Col 1 (x=9): gear 1 up, gear 2 down -->
  <line x1="9" y1="7" x2="9" y2="17"/>

  <!-- Col 2 (x=15): gear 3 up, gear 4 down -->
  <line x1="15" y1="7" x2="15" y2="17"/>

  <!-- Col 3 (x=21): gear 5 up to spine only -->
  <line x1="21" y1="7" x2="21" y2="12"/>

  <!-- R circle -->
  <circle cx="3" cy="5" r="1.5" stroke="#888780"/>

  <!-- 1 -->
  <circle cx="9" cy="5" r="1.5"/>

  <!-- 2 -->
  <circle cx="9" cy="19" r="1.5"/>

  <!-- 3 -->
  <circle cx="15" cy="5" r="1.5"/>

  <!-- 4 -->
  <circle cx="15" cy="19" r="1.5"/>

  <!-- 5 -->
  <circle cx="21" cy="5" r="1.5" stroke="#0F6E56"/>

</svg>
